name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: omni-lang/compiler

jobs:
  bootstrap-smoke:
    name: Bootstrap Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build seed compiler
        run: cargo build --manifest-path omni-lang/compiler/Cargo.toml
      - name: Run stage0 bootstrap smoke test
        run: bash bootstrap.sh

  selfhost-infra:
    name: Self-Hosted Infra Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build seed compiler
        run: cargo build --manifest-path omni-lang/compiler/Cargo.toml
      - name: Run infra bootstrap
        run: bash omni-lang/bootstrap.sh --allow-infra-placeholders
      - name: Enforce real Stage1 compile
        run: |
          source omni-lang/build/bootstrap_status.env
          test "$STAGE1_COMPILATION_OK" = "1"
          test "$VERIFY_IDENTICAL" = "1"

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets -- --nocapture

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    continue-on-error: true  # Remove once all warnings are fixed
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets 2>&1 | tee clippy-output.txt
      - name: Upload clippy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report
          path: clippy-output.txt

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [bootstrap-smoke, selfhost-infra, check, test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
