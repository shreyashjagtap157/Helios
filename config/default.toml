# HELIOS Configuration
# All parameters are configurable - no hard limits

# ============================================
# Model Architecture
# ============================================
[model]
name = "helios-base"
vocab_size = 50257
hidden_dim = 768
num_layers = 12
num_heads = 12
max_seq_length = 2048
dropout = 0.1
activation = "gelu"

checkpoint_path = "checkpoints/latest"
tokenizer_path = "tokenizer"

# ============================================
# Advanced Optimizations (New)
# ============================================
[tang_sampling]
enabled = true
sample_rate = 128    # Number of samples for L2 tree

[pruning]
enabled = false      # Enable to run pruning pipeline
target_sparsity = 0.90
method = "block_influence"

[infini_attention]
enabled = true
segment_length = 2048
memory_dim = 256

[air_llm]
enabled = true       # Enable layer-wise offloading
chunk_size_mb = 512

[recursive_memory]
enabled = true
max_depth = 3

[continuous_learning]
enabled = true
confidence_threshold = 0.85
update_frequency = 500

# ============================================
# Training Configuration
# ============================================
[training]
enabled = true
data_path = "data/train"
checkpoint_dir = "checkpoints"

# Hyperparameters
learning_rate = 1e-4
min_learning_rate = 1e-6
weight_decay = 0.01
max_grad_norm = 1.0
warmup_steps = 1000
max_steps = 1000000

# Batch settings
batch_size = 32
gradient_accumulation_steps = 4
effective_batch_size = 128  # batch_size * gradient_accumulation_steps

# Checkpointing
checkpoint_interval_steps = 5000
checkpoint_keep_count = 3
save_optimizer_state = true

# Logging
log_interval = 100
eval_interval = 1000

# Precision
mixed_precision = true
bf16 = false  # Use FP16 by default

# ============================================
# Inference Configuration
# ============================================
[inference]
max_new_tokens = 512
temperature = 0.7
top_p = 0.9
top_k = 50
repetition_penalty = 1.1
use_kv_cache = true

# ============================================
# Data Loading
# ============================================
[data]
shuffle_buffer_size = 10000
num_workers = 4
prefetch_batches = 2
cache_dir = "cache/data"

# ============================================
# Web Learning
# ============================================
[web_learning]
enabled = true
max_results_per_query = 10
rate_limit_ms = 1000
max_crawl_depth = 2
cache_dir = "cache/web"

# Search engines to use
search_engines = ["duckduckgo", "wikipedia", "arxiv"]

# Blocked domains
blocked_domains = ["*.exe", "*.zip"]

# Dream state (passive learning)
[web_learning.dream_state]
enabled = true
min_idle_time_minutes = 5
cycle_interval_minutes = 30
max_topics_per_cycle = 10

# ============================================
# Safety (Asimov Protocol)
# ============================================
[safety]
enabled = true
strict_mode = true  # No exceptions to core laws
log_all_actions = true
require_verification = true
verification_timeout_minutes = 30

# Protected modules that cannot be modified
protected_modules = [
    "safety::asimov",
    "core::lib",
    "biometrics::identity"
]

# ============================================
# Biometrics
# ============================================
[biometrics]
enabled = true
enrollment_time_minutes = 30
min_keystroke_samples = 1000
verification_window_seconds = 60
similarity_threshold = 0.7

# Features to track
features = ["key_hold_time", "key_interval", "digraph_timing"]

# ============================================
# System
# ============================================
[system]
cuda_enabled = true
cuda_device = 0
memory_limit_gb = 32
cpu_threads = 8

# ============================================
# Logging
# ============================================
[logging]
level = "info"  # debug, info, warn, error
file = "logs/helios.log"
max_file_size_mb = 100
max_files = 10
format = "text"  # text or json
include_timestamps = true
include_module = true

# ============================================
# Hot Swap
# ============================================
[hot_swap]
enabled = true
sandbox_timeout_ms = 5000
backup_enabled = true
backup_dir = "backups/modules"
max_concurrent_swaps = 1
